<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Precios Cafetería</title>
  
  <!-- Fonts: Using Inter & Roboto for modern look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layouts.css">
  <link rel="stylesheet" href="css/components.css">
  
  <!-- PWA Configuration -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="img/icons/icon-192x192.png">
</head>
<body>
  
  <!-- Main Application Container (Mobile First) -->
  <div id="app-container" class="app-container">
    
    <!-- Top Header / Greeting -->
    <header class="app-header">
      <div class="header-content">
        <h1 class="font-heading">Catálogo</h1>
        <p class="text-subtitle">Productos disponibles</p>
      </div>
      <div class="header-actions">
        <!-- Optional Search / Filter icon -->
      </div>
    </header>

    <!-- Main Content Area: Catalog -->
    <main id="catalog-view" class="view-active">
      <!-- Category Tabs -->
      <nav id="category-tabs" class="category-tabs">
        <button class="tab-btn active" data-category="Todos">Todos</button>
        <button class="tab-btn" data-category="Galletas">Galletas</button>
        <button class="tab-btn" data-category="Bebidas">Bebidas</button>
        <button class="tab-btn" data-category="Otros">Otros</button>
      </nav>

      <!-- Products Grid (2 columns as per SRS) -->
      <div id="product-grid" class="product-grid">
        <!-- JS will populate products here -->
      </div>

      <!-- Empty/Loading/Error State Container -->
      <div id="feedback-container" class="feedback-container"></div>
    </main>

    <!-- Admin Panel (Hidden by default) -->
    <section id="admin-view" class="view-hidden">
      <!-- Admin Header -->
      <header class="app-header">
        <div class="header-content">
          <h1 class="font-heading">Administración</h1>
          <p class="text-subtitle">Gestión de productos</p>
        </div>
      </header>
      
      <!-- Admin Content -->
      <div class="admin-content">
        <form id="admin-form" class="admin-form">
          <input type="hidden" id="product-id" name="id">
          
          <div class="form-group">
            <label for="product-name">Nombre del Producto</label>
            <input type="text" id="product-name" name="nombre" placeholder="Ej. Nescafe Mocha" required>
          </div>

          <div class="form-group">
            <label for="product-category">Categoría</label>
            <select id="product-category" name="categoria" required>
              <option value="Galletas">Galletas</option>
              <option value="Bebidas">Bebidas</option>
              <option value="Otros">Otros</option>
            </select>
          </div>

          <div class="form-group">
            <label for="product-price">Precio ($)</label>
            <input type="number" step="0.01" id="product-price" name="precio" placeholder="0.00" required>
          </div>

          <div class="form-group">
            <label for="product-image">Imagen del Producto</label>
            <input type="file" id="product-image" name="imagen_file" accept="image/*">
            <small class="form-text">Si estás editando, deja este campo vacío para conservar la imagen actual.</small>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar Producto</button>
            <button type="button" id="btn-cancel-admin" class="btn btn-secondary">Cancelar</button>
          </div>
        </form>
        </div>
      </div>
    </section>

    <!-- Floating Action Button -->
    <button id="fab-add" class="fab">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" id="nav-catalog">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </button>
      <button class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
      </button>
      <button class="nav-item discount-icon">
        <svg fill="currentColor" width="24" height="24" viewBox="0 0 24 24"><path d="M12.43 2.58A2 2 0 0011 2H5a2 2 0 00-2 2v6a2 2 0 00.58 1.41l9 9a2 2 0 002.82 0l6-6a2 2 0 000-2.82l-9-9zM15 15L9 9m6 0a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM9 15a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      </button>
      <button class="nav-item" id="nav-admin">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </button>
    </nav>
    
  </div> <!-- /app-container -->

  <!-- App Scripts (ES Modules) -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
